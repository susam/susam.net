<!-- Comment {{ cm-gserial }} of {{ cm-count }} -->
<section id="{{ cm-gserial }}" class="{{ comment-class }}">
<h2>{{ commenter }} commented on <a href="../{{ cm-on-path }}"><em>{{ cm-on-title }}</em></a>:</h2>
{{ body }}<div>
<a href="#{{ cm-gserial }}">{{ cm-long-date }}</a> |
<a href="#{{ cm-gserial }}">#{{ cm-gserial }} of {{ cm-count }} {{ comment-label }}</a> |
<a href="../{{ comment-page-path }}#{{ comment-file-serial }}">View original comment</a>
</div>
</section>
